volumes:
  openclaw-brew:
  openclaw-pgdata:

networks:
  openclaw-net:
    driver: bridge

services:
  openclaw-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${OPENCLAW_PG_DB:-openclaw_qa}
      POSTGRES_USER: ${OPENCLAW_PG_USER:-openclaw}
      POSTGRES_PASSWORD: ${OPENCLAW_PG_PASS:-openclaw}
    volumes:
      - openclaw-pgdata:/var/lib/postgresql/data
    networks:
      - openclaw-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPENCLAW_PG_USER:-openclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_PG_DB: ${OPENCLAW_PG_DB:-openclaw_qa}
      OPENCLAW_PG_USER: ${OPENCLAW_PG_USER:-openclaw}
      OPENCLAW_PG_PASS: ${OPENCLAW_PG_PASS:-openclaw}
    volumes:
      - openclaw-brew:/home/linuxbrew/.linuxbrew
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    networks:
      - openclaw-net
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-postgres:
        condition: service_healthy
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    networks:
      - openclaw-net
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      OPENCLAW_PG_DB: ${OPENCLAW_PG_DB:-openclaw_qa}
      OPENCLAW_PG_USER: ${OPENCLAW_PG_USER:-openclaw}
      OPENCLAW_PG_PASS: ${OPENCLAW_PG_PASS:-openclaw}
    volumes:
      - openclaw-brew:/home/linuxbrew/.linuxbrew
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["scripts/docker-entrypoint.sh", "node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
