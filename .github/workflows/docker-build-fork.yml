name: Docker Build (fork → Docker Hub)

on:
  push:
    branches:
      - feature/docker-setup
  workflow_dispatch:

concurrency:
  group: docker-build-fork
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/docker-setup

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::8}"
          echo "tags=runmymind/openclaw:latest,runmymind/openclaw:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=runmymind/openclaw:buildcache
          cache-to: type=registry,ref=runmymind/openclaw:buildcache,mode=max
          provenance: false
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_INSTALL_BREW=1
            OPENCLAW_INSTALL_SKILL_DEPS=1
            OPENCLAW_SKIP_ML_DEPS=1
