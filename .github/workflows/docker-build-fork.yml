name: Docker Build (fork → Docker Hub)

on:
  push:
    branches:
      - main
  schedule:
    # Nightly at 03:00 UTC — sync upstream + rebuild
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: docker-build-fork
  cancel-in-progress: true

jobs:
  sync-upstream:
    name: Sync upstream/main → fork/main
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/openclaw/openclaw.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Rebase fork commits onto upstream/main
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Rebase our commits on top of upstream/main (fast-forward if no own commits)
          git rebase upstream/main || {
            echo "Rebase failed — possible conflict. Aborting."
            git rebase --abort
            exit 1
          }

      - name: Push rebased main to fork
        id: push
        run: |
          git push origin main --force-with-lease
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & push to Docker Hub
    runs-on: ubuntu-latest
    needs: sync-upstream
    steps:
      - name: Checkout (post-sync)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::8}"
          echo "tags=runmymind/openclaw:latest,runmymind/openclaw:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=runmymind/openclaw:buildcache
          cache-to: type=registry,ref=runmymind/openclaw:buildcache,mode=max
          provenance: false
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_INSTALL_BREW=1
            OPENCLAW_INSTALL_SKILL_DEPS=1
            OPENCLAW_SKIP_ML_DEPS=1
            OPENCLAW_INSTALL_POSTGRESQL=1
            OPENCLAW_INSTALL_WASP=1
